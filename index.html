<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🔧 Admin - Vui Cùng Xúc Xắc</title>

    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js",
                "firebase/database": "https://www.gstatic.com/firebasejs/11.0.2/firebase-database.js"
            }
        }
    </script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            color: #fff;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            background: rgba(0, 0, 0, 0.5);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(10px);
            border-bottom: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px 15px 0 0;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
        }
        .logo {
            font-size: 28px;
            font-weight: bold;
            background: linear-gradient(45deg, #f7971e, #ffd200);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        .btn {
            padding: 8px 20px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }
        .btn-primary {
            background: linear-gradient(45deg, #f7971e, #ffd200);
            color: #000;
        }
        .btn-primary:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(247, 151, 30, 0.5);
        }
        .btn-danger {
            background: #ff4757;
            color: #fff;
        }
        .btn-danger:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(255, 71, 87, 0.5);
        }
        .btn-success {
            background: #2ecc71;
            color: #fff;
        }
        .btn-success:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(46, 204, 113, 0.5);
        }
        .btn-warning {
            background: #f39c12;
            color: #fff;
        }
        .btn-warning:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(243, 156, 18, 0.5);
        }
        .btn-secondary {
            background: #7f8c8d;
            color: #fff;
        }
        .btn-secondary:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(127, 140, 141, 0.5);
        }

        .cards {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        .card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .card h3 {
            margin-bottom: 15px;
            color: #ffd700;
            border-bottom: 2px solid rgba(255, 215, 0, 0.2);
            padding-bottom: 10px;
        }
        .card .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }
        .card .input-group input,
        .card .input-group select {
            flex: 1;
            padding: 10px;
            border-radius: 10px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            background: rgba(0, 0, 0, 0.3);
            color: #fff;
            font-size: 14px;
            min-width: 100px;
        }
        .card .input-group input:focus,
        .card .input-group select:focus {
            outline: none;
            border-color: #ffd700;
        }
        .card .input-group input::placeholder {
            color: #666;
        }
        .card .input-group select option {
            background: #1a1a2e;
            color: #fff;
        }
        .card .btn {
            padding: 10px 20px;
            white-space: nowrap;
        }
        .card .btn-sm {
            padding: 6px 14px;
            font-size: 13px;
        }

        .user-list {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin-top: 20px;
        }
        .user-list h3 {
            margin-bottom: 15px;
            color: #ffd700;
            border-bottom: 2px solid rgba(255, 215, 0, 0.2);
            padding-bottom: 10px;
        }
        .user-list .table-wrap {
            overflow-x: auto;
        }
        .user-list table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }
        .user-list table th,
        .user-list table td {
            padding: 10px 12px;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .user-list table th {
            color: #ffd700;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 0.5px;
        }
        .user-list table tr:hover {
            background: rgba(255, 255, 255, 0.05);
        }
        .user-list table .action-btns {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
        }
        .user-list table .action-btns .btn {
            padding: 4px 12px;
            font-size: 12px;
            border-radius: 12px;
        }

        .loading {
            text-align: center;
            color: #666;
            padding: 20px;
        }

        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 10px;
            color: #fff;
            font-weight: bold;
            z-index: 999;
            animation: slideIn 0.5s ease;
            max-width: 400px;
        }
        .toast-success {
            background: #2ecc71;
        }
        .toast-error {
            background: #e74c3c;
        }
        .toast-info {
            background: #3498db;
        }
        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .status-online {
            color: #2ecc71;
            font-size: 12px;
            margin-left: 10px;
        }

        @media (max-width: 768px) {
            .cards {
                grid-template-columns: 1fr;
            }
            .header {
                flex-direction: column;
                text-align: center;
            }
            .card .input-group {
                flex-direction: column;
            }
            .user-list table {
                font-size: 12px;
            }
            .user-list table th,
            .user-list table td {
                padding: 6px 8px;
            }
            .user-list table .action-btns .btn {
                padding: 2px 8px;
                font-size: 10px;
            }
        }
    </style>
</head>
<body>

    <!-- ===== HEADER ===== -->
    <header class="header">
        <div class="logo">🔧 Admin - Vui Cùng Xúc Xắc</div>
        <div class="user-info">
            <span>👤 <strong>Admin</strong></span>
            <span class="status-online">● Online</span>
        </div>
    </header>

    <div class="container">

        <!-- ===== CARDS ===== -->
        <div class="cards">
            <!-- Card: Quản lý user -->
            <div class="card">
                <h3>👤 Quản lý User</h3>
                <div class="input-group">
                    <input type="text" id="userSearch" placeholder="Tìm user theo tên hoặc ID..." />
                    <button class="btn btn-primary" id="searchUserBtn">🔍 Tìm</button>
                </div>
                <div class="input-group">
                    <select id="userSelect">
                        <option value="">-- Chọn user --</option>
                    </select>
                    <input type="number" id="amountInput" placeholder="Số điểm..." value="100" />
                </div>
                <div style="display:flex; gap:10px; flex-wrap:wrap; margin-bottom:10px;">
                    <button class="btn btn-success btn-sm" id="addPointsBtn">➕ Tăng điểm</button>
                    <button class="btn btn-danger btn-sm" id="subPointsBtn">➖ Giảm điểm</button>
                    <button class="btn btn-warning btn-sm" id="resetPointsBtn">🔄 Reset 1000</button>
                </div>
                <div style="display:flex; gap:10px; flex-wrap:wrap;">
                    <button class="btn btn-secondary btn-sm" id="loanBtn">💰 Cho vay x2</button>
                    <button class="btn btn-danger btn-sm" id="deleteUserBtn" style="background:#c0392b;">🗑️ Xóa user</button>
                    <button class="btn btn-secondary btn-sm" id="refreshBtn">🔄 Tải lại</button>
                </div>
            </div>

            <!-- Card: Xóa lịch sử & chat -->
            <div class="card">
                <h3>🗑️ Xóa dữ liệu</h3>
                <div class="input-group">
                    <select id="historyAction">
                        <option value="all">Xóa tất cả lịch sử</option>
                        <option value="last5">Xóa 5 kết quả gần nhất</option>
                        <option value="last10">Xóa 10 kết quả gần nhất</option>
                        <option value="last20">Xóa 20 kết quả gần nhất</option>
                        <option value="custom">Xóa theo số lượng</option>
                    </select>
                    <input type="number" id="historyCount" placeholder="Số lượng..." value="5" style="display:none; width:100px;" />
                </div>
                <button class="btn btn-danger" id="clearHistoryBtn" style="width:100%;">🗑️ Xóa lịch sử</button>

                <hr style="border-color:rgba(255,255,255,0.1); margin:15px 0;" />

                <div class="input-group">
                    <select id="chatAction">
                        <option value="all">Xóa tất cả chat</option>
                        <option value="last5">Xóa 5 tin nhắn gần nhất</option>
                        <option value="last10">Xóa 10 tin nhắn gần nhất</option>
                        <option value="last20">Xóa 20 tin nhắn gần nhất</option>
                        <option value="custom">Xóa theo số lượng</option>
                    </select>
                    <input type="number" id="chatCount" placeholder="Số lượng..." value="5" style="display:none; width:100px;" />
                </div>
                <button class="btn btn-danger" id="clearChatBtn" style="width:100%;">🗑️ Xóa chat</button>
            </div>
        </div>

        <!-- ===== USER LIST ===== -->
        <div class="user-list">
            <h3>📋 Danh sách người chơi <span style="font-size:14px; color:#aaa; font-weight:normal;" id="playerCount"></span></h3>
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>UID</th>
                            <th>Tên</th>
                            <th>Số dư</th>
                            <th>Thắng</th>
                            <th>Ván</th>
                            <th>Tỷ lệ</th>
                            <th>Hành động</th>
                        </tr>
                    </thead>
                    <tbody id="userTableBody">
                        <tr>
                            <td colspan="8" class="loading">Đang tải...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="toastContainer"></div>

    <!-- ============================================================ -->
    <!-- MAIN SCRIPT -->
    <!-- ============================================================ -->
    <script type="module">
        // =====================================================
        // IMPORT FIREBASE MODULES
        // =====================================================
        import { initializeApp } from "firebase/app";
        import { getDatabase, ref, onValue, set, get, remove } from "firebase/database";

        // =====================================================
        // FIREBASE CONFIG
        // =====================================================
        const firebaseConfig = {
            apiKey: "AIzaSyBvKVqzcPXeZ5ryh69-ig1D7N6arVA28O4",
            authDomain: "lucky-2dbaa.firebaseapp.com",
            databaseURL: "https://lucky-2dbaa-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "lucky-2dbaa",
            storageBucket: "lucky-2dbaa.firebasestorage.app",
            messagingSenderId: "611841376239",
            appId: "1:611841376239:web:86ec93a3c75b4da35bc01a",
            measurementId: "G-6H1ZWHW8PP"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // =====================================================
        // CONFIG
        // =====================================================
        const ROOM_ID = 'public_room';

        // =====================================================
        // DOM REFS
        // =====================================================
        const userTableBody = document.getElementById('userTableBody');
        const playerCount = document.getElementById('playerCount');
        const userSearch = document.getElementById('userSearch');
        const searchUserBtn = document.getElementById('searchUserBtn');
        const userSelect = document.getElementById('userSelect');
        const amountInput = document.getElementById('amountInput');
        const addPointsBtn = document.getElementById('addPointsBtn');
        const subPointsBtn = document.getElementById('subPointsBtn');
        const resetPointsBtn = document.getElementById('resetPointsBtn');
        const loanBtn = document.getElementById('loanBtn');
        const deleteUserBtn = document.getElementById('deleteUserBtn');
        const refreshBtn = document.getElementById('refreshBtn');
        const historyAction = document.getElementById('historyAction');
        const historyCount = document.getElementById('historyCount');
        const clearHistoryBtn = document.getElementById('clearHistoryBtn');
        const chatAction = document.getElementById('chatAction');
        const chatCount = document.getElementById('chatCount');
        const clearChatBtn = document.getElementById('clearChatBtn');
        const toastContainer = document.getElementById('toastContainer');

        // =====================================================
        // STATE
        // =====================================================
        let allPlayers = {};

        // =====================================================
        // TOAST
        // =====================================================
        function showToast(message, type = 'info') {
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.textContent = message;
            toastContainer.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transition = 'opacity 0.5s';
                setTimeout(() => toast.remove(), 500);
            }, 3000);
        }

        // =====================================================
        // LOAD DATA
        // =====================================================
        function loadData() {
            const playersRef = ref(db, `rooms/${ROOM_ID}/players`);
            onValue(playersRef, (snapshot) => {
                const data = snapshot.val();
                if (data) {
                    allPlayers = data;
                    updateUserTable(data);
                    updateUserSelect(data);
                } else {
                    allPlayers = {};
                    userTableBody.innerHTML = '<tr><td colspan="8" class="loading">Chưa có người chơi</td></tr>';
                    userSelect.innerHTML = '<option value="">-- Chưa có user --</option>';
                    playerCount.textContent = '(0)';
                }
            });
        }

        // =====================================================
        // UPDATE USER TABLE
        // =====================================================
        function updateUserTable(players) {
            const entries = Object.entries(players);
            if (entries.length === 0) {
                userTableBody.innerHTML = '<tr><td colspan="8" class="loading">Chưa có người chơi</td></tr>';
                playerCount.textContent = '(0)';
                return;
            }

            playerCount.textContent = `(${entries.length})`;

            const searchTerm = userSearch.value.toLowerCase().trim();
            let filtered = entries;
            if (searchTerm) {
                filtered = entries.filter(([uid, data]) => {
                    const name = (data.name || '').toLowerCase();
                    return name.includes(searchTerm) || uid.includes(searchTerm);
                });
            }

            filtered.sort((a, b) => (b[1].balance || 0) - (a[1].balance || 0));

            userTableBody.innerHTML = filtered.map(([uid, data], index) => {
                const name = data.name || 'Người chơi';
                const balance = data.balance || 0;
                const wins = data.wins || 0;
                const totalGames = data.totalGames || 0;
                const winRate = totalGames > 0 ? Math.round((wins / totalGames) * 100) : 0;

                return `
                    <tr>
                        <td>${index + 1}</td>
                        <td style="font-size:11px; color:#aaa; max-width:100px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;" title="${uid}">${uid.substring(0, 10)}...</td>
                        <td><strong>${name}</strong></td>
                        <td style="color:#ffd700; font-weight:bold;">${balance}</td>
                        <td>${wins}</td>
                        <td>${totalGames}</td>
                        <td>${winRate}%</td>
                        <td>
                            <div class="action-btns">
                                <button class="btn btn-success" onclick="window.adminAction('addPoints', '${uid}')" title="Tăng điểm">+</button>
                                <button class="btn btn-danger" onclick="window.adminAction('subPoints', '${uid}')" title="Giảm điểm">-</button>
                                <button class="btn btn-warning" onclick="window.adminAction('resetPoints', '${uid}')" title="Reset về 1000">R</button>
                                <button class="btn btn-secondary" onclick="window.adminAction('loan', '${uid}')" title="Cho vay x2">💰</button>
                                <button class="btn btn-danger" onclick="window.adminAction('deleteUser', '${uid}')" style="background:#c0392b;" title="Xóa user">🗑️</button>
                            </div>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        // =====================================================
        // UPDATE USER SELECT
        // =====================================================
        function updateUserSelect(players) {
            const entries = Object.entries(players);
            if (entries.length === 0) {
                userSelect.innerHTML = '<option value="">-- Chưa có user --</option>';
                return;
            }

            entries.sort((a, b) => (a[1].name || '').localeCompare(b[1].name || ''));

            userSelect.innerHTML = entries.map(([uid, data]) => {
                const name = data.name || 'Người chơi';
                return `<option value="${uid}">${name} (${uid.substring(0, 8)}...)</option>`;
            }).join('');
        }

        // =====================================================
        // ADMIN ACTIONS - SỬA LỖI KHÔNG DÙNG .child()
        // =====================================================
        window.adminAction = async function(action, uid) {
            try {
                // Lấy dữ liệu user
                const playerRef = ref(db, `rooms/${ROOM_ID}/players/${uid}`);
                const snapshot = await get(playerRef);
                if (!snapshot.exists()) {
                    showToast('❌ Không tìm thấy user!', 'error');
                    return;
                }

                const playerData = snapshot.val();
                const currentBalance = playerData.balance || 0;
                const amount = parseInt(amountInput.value) || 100;
                let newBalance = currentBalance;
                let actionName = '';

                switch (action) {
                    case 'addPoints':
                        newBalance = currentBalance + amount;
                        actionName = `+${amount} điểm`;
                        break;
                    case 'subPoints':
                        newBalance = Math.max(0, currentBalance - amount);
                        actionName = `-${amount} điểm`;
                        break;
                    case 'resetPoints':
                        newBalance = 1000;
                        actionName = 'reset về 1000 điểm';
                        break;
                    case 'loan':
                        const loanAmount = currentBalance > 0 ? currentBalance : 100;
                        newBalance = currentBalance + loanAmount;
                        actionName = `vay +${loanAmount} điểm`;
                        break;
                    case 'deleteUser':
                        if (confirm(`Bạn có chắc muốn xóa user "${playerData.name}"?`)) {
                            await remove(playerRef);
                            showToast(`🗑️ Đã xóa user ${playerData.name}`, 'success');
                            loadData();
                            return;
                        }
                        return;
                    default:
                        showToast('❌ Hành động không hợp lệ!', 'error');
                        return;
                }

                if (action !== 'deleteUser') {
                    // Cập nhật balance - dùng ref trực tiếp
                    const balanceRef = ref(db, `rooms/${ROOM_ID}/players/${uid}/balance`);
                    await set(balanceRef, newBalance);
                    showToast(`✅ ${playerData.name}: ${actionName} → ${newBalance} điểm`, 'success');
                }

            } catch (error) {
                console.error('Action error:', error);
                showToast('❌ Lỗi: ' + error.message, 'error');
            }
        };

        // =====================================================
        // BUTTON EVENTS
        // =====================================================
        function getSelectedUser() {
            const uid = userSelect.value;
            if (!uid) {
                showToast('❌ Chọn user trước!', 'error');
                return null;
            }
            return uid;
        }

        addPointsBtn.addEventListener('click', () => {
            const uid = getSelectedUser();
            if (uid) window.adminAction('addPoints', uid);
        });

        subPointsBtn.addEventListener('click', () => {
            const uid = getSelectedUser();
            if (uid) window.adminAction('subPoints', uid);
        });

        resetPointsBtn.addEventListener('click', () => {
            const uid = getSelectedUser();
            if (uid) window.adminAction('resetPoints', uid);
        });

        loanBtn.addEventListener('click', () => {
            const uid = getSelectedUser();
            if (uid) window.adminAction('loan', uid);
        });

        deleteUserBtn.addEventListener('click', () => {
            const uid = getSelectedUser();
            if (uid) window.adminAction('deleteUser', uid);
        });

        refreshBtn.addEventListener('click', () => {
            loadData();
            showToast('🔄 Đã tải lại dữ liệu', 'info');
        });

        searchUserBtn.addEventListener('click', () => {
            loadData();
        });

        userSearch.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                loadData();
            }
        });

        // =====================================================
        // XÓA LỊCH SỬ
        // =====================================================
        clearHistoryBtn.addEventListener('click', async () => {
            try {
                const action = historyAction.value;
                let count = parseInt(historyCount.value) || 5;

                const historyRef = ref(db, `rooms/${ROOM_ID}/history`);
                const snapshot = await get(historyRef);
                if (!snapshot.exists()) {
                    showToast('ℹ️ Không có lịch sử để xóa', 'info');
                    return;
                }

                const history = snapshot.val();
                const keys = Object.keys(history);

                if (keys.length === 0) {
                    showToast('ℹ️ Không có lịch sử để xóa', 'info');
                    return;
                }

                let keysToRemove = [];

                switch (action) {
                    case 'all':
                        keysToRemove = keys;
                        break;
                    case 'last5':
                        keysToRemove = keys.slice(-5);
                        break;
                    case 'last10':
                        keysToRemove = keys.slice(-10);
                        break;
                    case 'last20':
                        keysToRemove = keys.slice(-20);
                        break;
                    case 'custom':
                        const customCount = Math.min(count, keys.length);
                        keysToRemove = keys.slice(-customCount);
                        break;
                    default:
                        keysToRemove = keys;
                }

                if (keysToRemove.length === 0) {
                    showToast('ℹ️ Không có gì để xóa', 'info');
                    return;
                }

                if (!confirm(`Bạn có chắc muốn xóa ${keysToRemove.length} mục lịch sử?`)) return;

                for (const key of keysToRemove) {
                    await remove(ref(db, `rooms/${ROOM_ID}/history/${key}`));
                }

                showToast(`🗑️ Đã xóa ${keysToRemove.length} mục lịch sử`, 'success');

            } catch (error) {
                console.error('Clear history error:', error);
                showToast('❌ Lỗi: ' + error.message, 'error');
            }
        });

        // =====================================================
        // XÓA CHAT
        // =====================================================
        clearChatBtn.addEventListener('click', async () => {
            try {
                const action = chatAction.value;
                let count = parseInt(chatCount.value) || 5;

                const chatRef = ref(db, `rooms/${ROOM_ID}/chat`);
                const snapshot = await get(chatRef);
                if (!snapshot.exists()) {
                    showToast('ℹ️ Không có tin nhắn để xóa', 'info');
                    return;
                }

                const chat = snapshot.val();
                const keys = Object.keys(chat);

                if (keys.length === 0) {
                    showToast('ℹ️ Không có tin nhắn để xóa', 'info');
                    return;
                }

                let keysToRemove = [];

                switch (action) {
                    case 'all':
                        keysToRemove = keys;
                        break;
                    case 'last5':
                        keysToRemove = keys.slice(-5);
                        break;
                    case 'last10':
                        keysToRemove = keys.slice(-10);
                        break;
                    case 'last20':
                        keysToRemove = keys.slice(-20);
                        break;
                    case 'custom':
                        const customCount = Math.min(count, keys.length);
                        keysToRemove = keys.slice(-customCount);
                        break;
                    default:
                        keysToRemove = keys;
                }

                if (keysToRemove.length === 0) {
                    showToast('ℹ️ Không có gì để xóa', 'info');
                    return;
                }

                if (!confirm(`Bạn có chắc muốn xóa ${keysToRemove.length} tin nhắn?`)) return;

                for (const key of keysToRemove) {
                    await remove(ref(db, `rooms/${ROOM_ID}/chat/${key}`));
                }

                showToast(`🗑️ Đã xóa ${keysToRemove.length} tin nhắn`, 'success');

            } catch (error) {
                console.error('Clear chat error:', error);
                showToast('❌ Lỗi: ' + error.message, 'error');
            }
        });

        // =====================================================
        // HIỂN THỊ INPUT COUNT KHI CHỌN CUSTOM
        // =====================================================
        historyAction.addEventListener('change', () => {
            historyCount.style.display = historyAction.value === 'custom' ? 'inline-block' : 'none';
        });

        chatAction.addEventListener('change', () => {
            chatCount.style.display = chatAction.value === 'custom' ? 'inline-block' : 'none';
        });

        // =====================================================
        // INIT
        // =====================================================
        console.log('🔧 Admin Panel started!');
        console.log('📁 Database path: /rooms/' + ROOM_ID + '/players');
        loadData();
    </script>
</body>
</html>
