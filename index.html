<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SBIDI DEV - Media Session Test</title>
    <style>
        body {
            background: #030712;
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .album-art {
            width: 200px;
            height: 200px;
            border-radius: 16px;
            margin-bottom: 20px;
            box-shadow: 0 0 30px rgba(56,189,248,0.3);
            animation: spin 8s linear infinite;
            animation-play-state: paused;
        }
        .album-art.playing { animation-play-state: running; }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .controls {
            display: flex;
            gap: 15px;
            align-items: center;
            margin-top: 20px;
        }
        button {
            width: 50px; height: 50px; border-radius: 50%;
            border: none; cursor: pointer; font-size: 1.2rem;
            background: #38bdf8; color: white;
            box-shadow: 0 0 15px rgba(56,189,248,0.4);
        }
        button:hover { transform: scale(1.1); }
        .info { margin-top: 15px; color: #94a3b8; font-size: 0.85rem; }
    </style>
</head>
<body>

    <h1 style="color: #38bdf8;">🎵 TEST MEDIA SESSION</h1>
    <p style="color: #94a3b8; font-size: 0.85rem;">Kéo thanh thông báo xuống để xem ảnh bìa!</p>

    <!-- Ảnh bìa album -->
    <img id="albumArt" class="album-art" 
         src="https://picsum.photos/seed/music/400/400" 
         alt="Album Art"
         onerror="this.src='https://placehold.co/400x400/030712/38bdf8?text=SBIDI+MUSIC'">

    <h2 id="trackTitle" style="margin-top: 15px;">SBIDI DEV Theme</h2>
    <p id="trackArtist" style="color: #94a3b8;">SCM Team</p>

    <div class="controls">
        <button onclick="prevTrack()">⏮</button>
        <button id="playBtn" onclick="togglePlay()">▶</button>
        <button onclick="nextTrack()">⏭</button>
    </div>

    <p class="info" id="status">Chưa phát nhạc</p>
    <p class="info">📱 Kéo Notification xuống để thấy ảnh bìa!</p>

    <audio id="bgMusic" loop>
        <source src="https://files.catbox.moe/effxlk.mp3" type="audio/mpeg">
    </audio>

<script>
const bgMusic = document.getElementById('bgMusic');
const albumArt = document.getElementById('albumArt');
const trackTitle = document.getElementById('trackTitle');
const trackArtist = document.getElementById('trackArtist');
const playBtn = document.getElementById('playBtn');
const statusEl = document.getElementById('status');
let isPlaying = false;

// === MEDIA SESSION API ===
// Đây là phần quan trọng để hiện ảnh bìa trên notification!
if ('mediaSession' in navigator) {
    navigator.mediaSession.metadata = new MediaMetadata({
        title: 'SBIDI DEV Theme',
        artist: 'SCM Team',
        album: 'SBIDI Background Music',
        artwork: [
            { src: 'https://picsum.photos/seed/music/96x96',   sizes: '96x96',   type: 'image/jpg' },
            { src: 'https://picsum.photos/seed/music/128x128', sizes: '128x128', type: 'image/jpg' },
            { src: 'https://picsum.photos/seed/music/192x192', sizes: '192x192', type: 'image/jpg' },
            { src: 'https://picsum.photos/seed/music/256x256', sizes: '256x256', type: 'image/jpg' },
            { src: 'https://picsum.photos/seed/music/384x384', sizes: '384x384', type: 'image/jpg' },
            { src: 'https://picsum.photos/seed/music/512x512', sizes: '512x512', type: 'image/jpg' },
        ]
    });

    // Điều khiển từ thanh thông báo
    navigator.mediaSession.setActionHandler('play', () => { playMusic(); });
    navigator.mediaSession.setActionHandler('pause', () => { pauseMusic(); });
    navigator.mediaSession.setActionHandler('previoustrack', () => { prevTrack(); });
    navigator.mediaSession.setActionHandler('nexttrack', () => { nextTrack(); });
    navigator.mediaSession.setActionHandler('stop', () => { pauseMusic(); });
}

function playMusic() {
    bgMusic.play().then(() => {
        isPlaying = true;
        playBtn.textContent = '⏸';
        albumArt.classList.add('playing');
        statusEl.textContent = '🎵 Đang phát - Kéo Notification xuống!';
        
        // Cập nhật Media Session
        if ('mediaSession' in navigator) {
            navigator.mediaSession.playbackState = 'playing';
        }
    }).catch(err => {
        console.log("Lỗi phát nhạc:", err);
        statusEl.textContent = '❌ Lỗi phát nhạc! Click để thử lại.';
    });
}

function pauseMusic() {
    bgMusic.pause();
    isPlaying = false;
    playBtn.textContent = '▶';
    albumArt.classList.remove('playing');
    statusEl.textContent = '⏸ Đã tạm dừng';
    
    if ('mediaSession' in navigator) {
        navigator.mediaSession.playbackState = 'paused';
    }
}

function togglePlay() {
    isPlaying ? pauseMusic() : playMusic();
}

function prevTrack() {
    bgMusic.currentTime = 0;
    statusEl.textContent = '⏮ Quay lại đầu bài';
    if (!isPlaying) playMusic();
}

function nextTrack() {
    bgMusic.currentTime = 0;
    statusEl.textContent = '⏭ Phát lại từ đầu';
    if (!isPlaying) playMusic();
}

// Tự động phát khi click lần đầu
document.addEventListener('click', function init() {
    if (bgMusic.paused && !isPlaying) {
        playMusic();
    }
}, { once: true });

// Cập nhật vị trí thanh seekbar trên notification
bgMusic.addEventListener('timeupdate', () => {
    if ('mediaSession' in navigator && 'setPositionState' in navigator.mediaSession) {
        navigator.mediaSession.setPositionState({
            duration: bgMusic.duration || 0,
            playbackRate: bgMusic.playbackRate || 1,
            position: bgMusic.currentTime || 0,
        });
    }
});
</script>
</body>
</html>
