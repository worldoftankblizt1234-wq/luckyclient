<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Test Media Session - Ảnh Dropbox</title>
    <style>
        body {
            font-family: system-ui;
            background: #0a0a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .card {
            background: #1e1e2a;
            padding: 24px;
            border-radius: 32px;
            max-width: 360px;
            width: 100%;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
        }
        img {
            width: 100%;
            border-radius: 24px;
            margin-bottom: 20px;
            aspect-ratio: 1;
            object-fit: cover;
        }
        h2 { color: white; font-size: 1.5rem; margin-bottom: 4px; }
        .artist { color: #aaa; margin-bottom: 24px; }
        button {
            background: #5865f2;
            color: white;
            border: none;
            padding: 14px 28px;
            font-size: 1.2rem;
            font-weight: 600;
            border-radius: 60px;
            cursor: pointer;
            width: 100%;
        }
        .status {
            margin-top: 16px;
            font-size: 13px;
            color: #8affc2;
            background: rgba(0,0,0,0.5);
            padding: 10px;
            border-radius: 20px;
        }
        .debug {
            font-family: monospace;
            font-size: 10px;
            margin-top: 12px;
            color: #888;
            word-break: break-all;
        }
        .note {
            font-size: 0.7rem;
            color: #aaa;
            margin-top: 15px;
            border-top: 1px solid #ffffff20;
            padding-top: 12px;
        }
    </style>
</head>
<body>
<div class="card">
    <!-- ẢNH TỪ DROPBOX (ĐÃ SỬA LINK) -->
    <img id="albumArt" src="https://dl.dropboxusercontent.com/scl/fi/arjfo94n5z34ualyegemz/Gemini_Generated_Image_ui9921ui9921ui99.jpg?rlkey=ovpul608g6tvzdkcnk7rtb9eq" alt="artwork">
    <h2>🎵 Lofi Girl - Chill Beats</h2>
    <div class="artist">🎤 Lofi Music Library</div>
    
    <button id="playBtn">▶️ PHÁT NHẠC</button>
    
    <div class="status" id="statusMsg">⚡ Bấm Play rồi vuốt Control Center xuống</div>
    <div class="debug" id="debugMsg">🔍 Đang khởi tạo...</div>
    <div class="note">
        📱 <strong>CÁCH TEST:</strong> Bấm Play → Vuốt Control Center (từ đỉnh màn hình xuống) → Kiểm tra ảnh.
    </div>
</div>

<script>
    // ========== LINK MP3 (DROPBOX ĐÃ SỬA) ==========
    const AUDIO_URL = 'https://dl.dropboxusercontent.com/scl/fi/6did53gw48axz2ut5xuo5/lofi_music_library-lofi-girl-chill-lofi-beats-lofi-ambient-461871.mp3?rlkey=pvqx1t607s5dtdb3xlu7u9kax';
    
    // ẢNH TỪ DROPBOX (ĐÃ SỬA) - trùng với src trong thẻ img
    const ARTWORK_URL = 'https://dl.dropboxusercontent.com/scl/fi/arjfo94n5z34ualyegemz/Gemini_Generated_Image_ui9921ui9921ui99.jpg?rlkey=ovpul608g6tvzdkcnk7rtb9eq';
    
    const SONG_TITLE = 'Lofi Chill Beats';
    const ARTIST_NAME = 'Lofi Music Library';
    // ===============================================

    const audio = new Audio(AUDIO_URL);
    audio.preload = 'auto';
    audio.volume = 0.6;
    
    let isPlaying = false;
    const playBtn = document.getElementById('playBtn');
    const statusDiv = document.getElementById('statusMsg');
    const debugSpan = document.getElementById('debugMsg');
    const albumArtImg = document.getElementById('albumArt');
    
    function log(msg, isError = false) {
        const time = new Date().toLocaleTimeString();
        debugSpan.innerHTML = `📡 ${time}: ${msg}`;
        console.log(msg);
    }
    
    // ========== MEDIA SESSION API (HIỂN THỊ ẢNH TRÊN MÀN HÌNH KHÓA) ==========
    function updateMediaSession() {
        if (!('mediaSession' in navigator)) {
            log('❌ Trình duyệt KHÔNG hỗ trợ Media Session API');
            statusDiv.innerHTML = '⚠️ Dùng Chrome/Safari mới nhất trên điện thoại.';
            return false;
        }
        
        const metadata = new MediaMetadata({
            title: SONG_TITLE,
            artist: ARTIST_NAME,
            album: 'SBIDI DEV',
            artwork: [
                { src: ARTWORK_URL, sizes: '512x512', type: 'image/jpeg' },
                { src: ARTWORK_URL, sizes: '256x256', type: 'image/jpeg' }
            ]
        });
        
        navigator.mediaSession.metadata = metadata;
        navigator.mediaSession.setActionHandler('play', () => {
            log('📱 Lệnh Play từ Media Session');
            audio.play();
        });
        navigator.mediaSession.setActionHandler('pause', () => {
            log('📱 Lệnh Pause từ Media Session');
            audio.pause();
        });
        
        log('✅ Media Session đã cập nhật với ẢNH từ Dropbox');
        return true;
    }
    
    async function playMusic() {
        try {
            // Cập nhật Media Session TRƯỚC khi phát (quan trọng!)
            updateMediaSession();
            
            await audio.play();
            isPlaying = true;
            if ('mediaSession' in navigator) navigator.mediaSession.playbackState = 'playing';
            playBtn.innerHTML = '⏸️ DỪNG';
            statusDiv.innerHTML = '🎶 ĐANG PHÁT! Hãy vuốt Control Center xuống để thấy ảnh.';
            log('✅ PHÁT THÀNH CÔNG! Vuốt Control Center để kiểm tra ảnh.');
        } catch (err) {
            log(`❌ LỖI PHÁT: ${err.message}`, true);
            statusDiv.innerHTML = `⚠️ Lỗi: ${err.message}. Kiểm tra link MP3.`;
        }
    }
    
    function pauseMusic() {
        audio.pause();
        isPlaying = false;
        if ('mediaSession' in navigator) navigator.mediaSession.playbackState = 'paused';
        playBtn.innerHTML = '▶️ PHÁT NHẠC';
        statusDiv.innerHTML = '⏸ Đã dừng. Bấm Play lại để xem ảnh.';
        log('⏸ Dừng nhạc');
    }
    
    function togglePlay() {
        if (isPlaying) {
            pauseMusic();
        } else {
            playMusic();
        }
    }
    
    playBtn.onclick = togglePlay;
    
    // Kiểm tra ảnh có load được không
    albumArtImg.onload = () => log('✅ ẢNH DROPBOX load thành công!');
    albumArtImg.onerror = () => log('❌ ẢNH DROPBOX load thất bại. Kiểm tra lại link.', true);
    
    // Theo dõi sự kiện audio
    audio.addEventListener('play', () => {
        isPlaying = true;
        if ('mediaSession' in navigator) navigator.mediaSession.playbackState = 'playing';
        playBtn.innerHTML = '⏸️ DỪNG';
    });
    
    audio.addEventListener('pause', () => {
        isPlaying = false;
        if ('mediaSession' in navigator) navigator.mediaSession.playbackState = 'paused';
        playBtn.innerHTML = '▶️ PHÁT NHẠC';
    });
    
    audio.addEventListener('ended', () => {
        isPlaying = false;
        if ('mediaSession' in navigator) navigator.mediaSession.playbackState = 'paused';
        playBtn.innerHTML = '▶️ PHÁT NHẠC';
        statusDiv.innerHTML = '🏁 Bài hát kết thúc. Bấm Play lại.';
        log('🏁 Bài hát kết thúc');
    });
    
    audio.addEventListener('error', (e) => {
        log('⚠️ LỖI LOAD NHẠC: ' + (audio.error?.message || 'không xác định'), true);
        statusDiv.innerHTML = '⚠️ Không thể tải MP3. Kiểm tra link Dropbox hoặc thử cách 2.';
    });
    
    // Kiểm tra Media Session khi khởi tạo
    if ('mediaSession' in navigator) {
        log('🎉 Trình duyệt HỖ TRỢ Media Session API');
        statusDiv.innerHTML = '✅ Sẵn sàng! Bấm Play → Vuốt Control Center → Thấy ảnh.';
    } else {
        log('⚠️ Trình duyệt KHÔNG hỗ trợ Media Session');
        statusDiv.innerHTML = '⚠️ Vui lòng dùng Chrome/Safari/Edge trên điện thoại.';
    }
    
    log('🚀 Trang đã sẵn sàng. Hãy bấm PLAY và vuốt Control Center!');
</script>
</body>
</html>
